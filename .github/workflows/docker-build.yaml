name: Build and push docker image

on:
  push:
    branches:
      - main

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: login docker hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: build image and push to dockerhub
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: nilesh1234/demo-nginix:np-${{ github.sha }}

    - name: Update application Repo
      run: |
        git clone https://${{ secrets.GITOPS_PAT }}@github.com/patilnileshkumar111/new_workflow.git
        cd new_workflow/argocd_repo/
        sed -i "s|image:.*|image: nilesh1234/demo-nginix:np-${GITHUB_SHA}|g" dep.yaml
        git config user.name "gha"
        git config user.email "gha@github.com"
        git add .
        git commit -m "update image tag to np-${GITHUB_SHA}"
        git push
